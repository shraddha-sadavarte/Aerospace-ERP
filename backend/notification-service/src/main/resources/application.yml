server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

  # Email config — using Gmail as example
  # For development: set spring.mail.test-connection=false to skip real sending
  mail:
    host: smtp.gmail.com
    port: 587
    username: sadavarteshraddha03@gmail.com   # replace with your email
    password: your-app-password      # replace with Gmail app password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Notification settings
notification:
  email:
    enabled: false        # set true when you have real SMTP credentials
    recipient: warehouse-manager@aerospace.com
  low-stock-threshold: 10 # alert if approved qty drops below this

logging:
  level:
    com.aerospace.notification_service: DEBUG
    org.apache.kafka: WARN