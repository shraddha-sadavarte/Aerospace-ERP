server:
  port: 8082   # inventory is 8081, QA is 8082

spring:
  application:
    name: qa-service

  datasource:
    url: jdbc:postgresql://localhost:5432/qa_db   # separate DB from inventory
    username: postgres
    password: postgres@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.info.headers: false

    consumer:
      group-id: qa-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.type.mapping: "stockReceived:com.aerospace.qa_service.event.StockReceivedEvent"
        spring.json.value.default.type: com.aerospace.qa_service.event.StockReceivedEvent

# Logging
logging:
  level:
    com.aerospace.qa_service: DEBUG
    org.apache.kafka: WARN   # suppress verbose Kafka internal logs